<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据拉取日志 | 美股晴雨表</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;font-family:"Microsoft YaHei",sans-serif}
        body{background:#f4f6f8;padding:20px;max-width:1000px;margin:auto}
        h1{text-align:center;margin-bottom:20px;color:#222}
        .title{text-align:center;color:#666;margin-bottom:30px}
        .card{background:#fff;border-radius:10px;padding:15px 20px;margin-bottom:15px;box-shadow:0 2px 6px #0000000a}
        .date{font-size:16px;font-weight:bold;color:#333;margin-bottom:10px}
        .item{display:flex;align-items:center;margin:6px 0;font-size:15px}
        .status{margin-right:10px;width:18px;height:18px}
        .name{flex:1}
        .link{color:#0066cc;text-decoration:none}
        .link:hover{text-decoration:underline}
        .back{text-align:center;margin:30px 0}
        .back a{color:#0066cc;text-decoration:none}
    </style>
</head>
<body>
    <h1>📊 美股晴雨表 - 数据拉取日志</h1>
    <div class="title">每天自动记录，数据源状态完全透明可查</div>
    <div id="logList">加载中...</div>
    <div class="back"><a href="index.html">← 返回主页</a></div>

    <script>
        async function loadLog() {
            let list = document.getElementById("logList");
            try {
                let res = await fetch("log.json");
                let logs = await res.json();
                if (!logs || logs.length === 0) {
                    list.innerHTML = "<div class='card'>暂无日志</div>";
                    return;
                }
                let html = "";
                logs.reverse().forEach(log => {
                    html += `<div class='card'><div class='date'>📅 ${log.date}</div>`;
                    for (let name in log.sources) {
                        let s = log.sources[name];
                        let ok = s.success ? "✅" : "❌";
                        let link = s.url ? `<a class='link' href='${s.url}' target='_blank'>官方查询</a>` : "";
                        html += `<div class='item'><span class='status'>${ok}</span><span class='name'>${name}</span>${link}</div>`;
                    }
                    html += `</div>`;
                });
                list.innerHTML = html;
            } catch (e) {
                list.innerHTML = "<div class='card'>加载失败</div>";
            }
        }
        loadLog();
    </script>
</body>
</html>
