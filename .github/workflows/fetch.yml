name: Fetch US Stock Data
on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 2  # 自动防卡死
    steps:
      - uses: actions/checkout@v5  # 升级版 → 无警告
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5  # 升级版 → 无警告
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run crawler
        run: python fetch.py

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"
          git add data.json
          git commit -m "Auto update market data" || echo "No changes"
          git push origin HEAD:main
