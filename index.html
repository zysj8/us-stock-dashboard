<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美股晴雨表 - 稳定版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:"Microsoft YaHei",sans-serif;max-width:1200px;margin:0 auto;padding:20px;background:#f4f6f8;}
        h1{text-align:center;color:#222;margin-bottom:10px;}
        .info{text-align:center;color:#666;margin-bottom:15px;}
        .仓位-box{max-width:600px;margin:0 auto 25px;padding:15px;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);text-align:center;}
        .仓位-title{font-size:16px;color:#555;margin-bottom:10px;}
        .lights{display:flex;justify-content:center;gap:12px;margin-bottom:10px;}
        .light{width:36px;height:36px;border-radius:50%;background:#ddd;border:2px solid #ccc;}
        .light.active-红{background:#d32f2f;box-shadow:0 0 10px #d32f2f;}
        .light.active-黄{background:#f57c00;box-shadow:0 0 10px #f57c00;}
        .light.active-绿{background:#388e3c;box-shadow:0 0 10px #388e3c;}
        .仓位-text{font-size:18px;font-weight:bold;color:#333;}
        table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1);margin-bottom:30px;}
        th,td{padding:12px 15px;text-align:left;border-bottom:1px solid #eee;}
        th{background:#f8f9fa;color:#333;}
        .high{background:#ffe9e9;color:#d32f2f;font-weight:bold;}
        .mid{background:#fff3e0;color:#f57c00;font-weight:bold;}
        .ok{background:#e8f5e9;color:#388e3c;font-weight:bold;}
        .chart-box{background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
        @media (max-width:768px){
            body{padding:10px;}
            table,thead,tbody,th,td,tr{display:block;}
            thead tr{position:absolute;top:-9999px;left:-9999px;}
            tr{border:1px solid #ccc;margin-bottom:10px;border-radius:8px;}
            td{border:none;border-bottom:1px solid #eee;padding-left:50%;position:relative;}
            td:before{position:absolute;left:15px;top:12px;width:45%;font-weight:bold;color:#555;}
            td:nth-child(1):before{content:"指标名称";}
            td:nth-child(2):before{content:"最新数值";}
            td:nth-child(3):before{content:"合理中枢";}
            td:nth-child(4):before{content:"风险阈值";}
            td:nth-child(5):before{content:"状态解读";}
        }
    </style>
</head>
<body>
    <h1>美股晴雨表</h1>
    <div class="info" id="updateTime">数据加载中...</div>

    <div class="仓位-box">
        <div class="仓位-title">市场综合仓位信号</div>
        <div class="lights">
            <div class="light" id="lightGreen"></div>
            <div class="light" id="lightYellow"></div>
            <div class="light" id="lightRed"></div>
        </div>
        <div class="仓位-text" id="posText">计算中...</div>
    </div>

    <table id="dataTable">
        <thead>
            <tr>
                <th>指标名称</th>
                <th>最新数值</th>
                <th>合理中枢</th>
                <th>风险阈值</th>
                <th>状态解读</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div class="chart-box">
        <h3 style="margin-bottom:15px;color:#333;">近一年关键指标趋势</h3>
        <canvas id="trendChart"></canvas>
    </div>

<script>
const metaConfig = [
  {name:"巴菲特指标(总市值/GDP)",center:"110%",threshold:"＞150%高估",rule:v=>parseFloat(v)>150?"high":parseFloat(v)>110?"mid":"ok",descMap:{high:"极度高估 历史高位",mid:"中度高估",ok:"合理区间"}},
  {name:"标普500 席勒CAPE",center:"16.0倍",threshold:"＞30倍高估",rule:v=>parseFloat(v)>30?"high":parseFloat(v)>20?"mid":"ok",descMap:{high:"泡沫级估值 历史高位",mid:"估值偏高",ok:"估值合理"}},
  {name:"标普500 TTM市盈率",center:"16.2倍",threshold:"＞22倍偏高",rule:v=>parseFloat(v)>22?"high":parseFloat(v)>18?"mid":"ok",descMap:{high:"估值昂贵 偏离均值",mid:"小幅溢价",ok:"估值正常"}},
  {name:"标普500 预估市盈率",center:"17.2倍",threshold:"＞20倍溢价",rule:v=>parseFloat(v)>20?"high":parseFloat(v)>18?"mid":"ok",descMap:{high:"远期定价过热",mid:"轻微溢价",ok:"盈利预期合理"}},
  {name:"美国10年期国债收益率",center:"3.50%",threshold:"＞4.0%高位",rule:v=>parseFloat(v)>4.0?"high":parseFloat(v)>3.5?"mid":"ok",descMap:{high:"利率高位 压制股市",mid:"利率中性偏高",ok:"利率温和"}},
  {name:"股债收益率差(股息-10Y美债)",center:"+1.00%",threshold:"＜0%股弱债强",rule:v=>parseFloat(v)<0?"high":parseFloat(v)<1?"mid":"ok",descMap:{high:"债券性价比远优于股票",mid:"股债均衡",ok:"股票性价比占优"}},
  {name:"VIX波动率指数",center:"20.00",threshold:"＞30恐慌/＜12麻木",rule:v=>parseFloat(v)>30?"ok":parseFloat(v)<12?"mid":"ok",descMap:{high:"市场恐慌升温",mid:"情绪麻木谨慎",ok:"波动中性平稳"}},
  {name:"CNN恐惧与贪婪指数",center:"50",threshold:"＞75极度贪婪/＜25极度恐惧",rule:v=>parseFloat(v)>75?"high":parseFloat(v)>60?"mid":"ok",descMap:{high:"极度贪婪 情绪过热",mid:"贪婪区间",ok:"中性偏理性"}}
];

// 使用你提供的最新数据
const baseData = ["232%","39.74","31.83","20.86","4.42%","-3.36%","18.38","67.00"];
const monthLabels = ["2025-05","2025-06","2025-07","2025-08","2025-09","2025-10","2025-11","2025-12","2026-01","2026-02","2026-03","2026-04"];
const capeTrend = [32,33,34,35,36,37,38,38.5,39,39.2,39.5,39.74];
const vixTrend = [22,25,20,18,16,17,19,21,23,20,19,18.38];
const fgTrend = [45,50,55,60,62,65,68,70,68,65,66,67];

function calcPosition(){
    let score = 0;
    let buffett = parseFloat(baseData[0]);
    let cape = parseFloat(baseData[1]);
    let peTTM = parseFloat(baseData[2]);
    let yield10Y = parseFloat(baseData[4]);
    let spread = parseFloat(baseData[5]);
    let fg = parseFloat(baseData[7]);

    if(buffett > 150) score += 2;
    else if(buffett > 110) score += 1;
    if(cape > 30) score += 2;
    else if(cape > 20) score += 1;
    if(peTTM > 22) score += 1;
    if(yield10Y > 4.0) score += 1;
    if(spread < 0) score += 2;
    if(fg > 75) score += 2;
    else if(fg > 60) score += 1;

    document.getElementById("lightGreen").className = "light";
    document.getElementById("lightYellow").className = "light";
    document.getElementById("lightRed").className = "light";

    let posText = "";
    if(score <= 2){
        document.getElementById("lightGreen").className = "light active-绿";
        posText = "当前信号：激进仓位 8~9成";
    }else if(score <= 5){
        document.getElementById("lightYellow").className = "light active-黄";
        posText = "当前信号：中性仓位 5~6成";
    }else if(score <= 7){
        document.getElementById("lightYellow").className = "light active-黄";
        posText = "当前信号：谨慎仓位 2~3成";
    }else{
        document.getElementById("lightRed").className = "light active-红";
        posText = "当前信号：防守观望 0~1成";
    }
    document.getElementById("posText").innerText = posText;
}

function renderTable(data){
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";
  for(let i=0;i<metaConfig.length;i++){
    let item = metaConfig[i];
    let val = data[i];
    let numVal = val.replace(/%|倍/g,"");
    let status = item.rule(numVal);
    let desc = item.descMap[status];
    let tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${item.name}</td>
      <td class="${status}">${val}</td>
      <td>${item.center}</td>
      <td>${item.threshold}</td>
      <td>${desc}</td>
    `;
    tbody.appendChild(tr);
  }
}

function renderChart(){
  const ctx = document.getElementById("trendChart").getContext("2d");
  new Chart(ctx,{
    type:"line",
    data:{
      labels:monthLabels,
      datasets:[
        {label:"席勒CAPE",data:capeTrend,borderColor:"#d32f2f",tension:0.3,fill:false},
        {label:"VIX指数",data:vixTrend,borderColor:"#1976d2",tension:0.3,fill:false},
        {label:"恐惧贪婪指数",data:fgTrend,borderColor:"#388e3c",tension:0.3,fill:false}
      ]
    },
    options:{responsive:true,maintainAspectRatio:true}
  });
}

window.onload = function(){
  let now = new Date();
  document.getElementById("updateTime").innerText = "最新数据："+now.toLocaleDateString();
  calcPosition();
  renderTable(baseData);
  renderChart();
}
</script>
</body>
</html>
